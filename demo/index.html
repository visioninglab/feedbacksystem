<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Feedback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1a2e;
      --ink-soft: #4a4a5e;
      --ink-mute: #8a8a9a;
      --cream: #faf7f2;
      --cream-deep: #f3ede2;
      --paper: #ffffff;
      --line: #e8e2d4;
      --line-soft: #f0ebe0;

      --sage: #7a9b76;
      --sage-bg: #eef3ec;
      --coral: #e8826b;
      --coral-bg: #fbeee9;
      --ochre: #d4a574;
      --ochre-bg: #f8f0e3;
      --plum: #8e6b9e;
      --plum-bg: #f1ebf4;
      --teal: #4a8a8a;
      --teal-bg: #e8f0f0;

      --radius: 14px;
      --radius-sm: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--cream);
      color: var(--ink);
      line-height: 1.55;
      font-size: 15px;
    }

    .display { font-family: 'Fraunces', Georgia, serif; font-optical-sizing: auto; letter-spacing: -0.02em; }

    /* ========== TOP BAR ========== */
    .topbar {
      max-width: 1100px; margin: 0 auto; padding: 28px 32px 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .brand { display: flex; align-items: baseline; gap: 10px; cursor: pointer; }
    .brand-mark {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--ink); color: var(--cream);
      display: inline-flex; align-items: center; justify-content: center;
      font-family: 'Fraunces', serif; font-weight: 700; font-size: 18px;
      transform: translateY(6px);
    }
    .brand-name {
      font-family: 'Fraunces', serif; font-weight: 600; font-size: 20px; letter-spacing: -0.01em;
    }
    .brand-sub { font-size: 12px; color: var(--ink-mute); margin-left: 4px; }
    .topnav { display: flex; gap: 28px; align-items: center; }
    .topnav a {
      color: var(--ink-soft); text-decoration: none; font-size: 14px; font-weight: 500;
      padding-bottom: 4px; border-bottom: 1.5px solid transparent;
    }
    .topnav a:hover { color: var(--ink); border-bottom-color: var(--ink); }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--coral), var(--ochre));
      color: var(--paper); display: inline-flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 13px;
    }

    .demo-banner {
      max-width: 1100px; margin: 16px auto 0; padding: 0 32px;
    }
    .demo-banner-inner {
      background: var(--cream-deep); border: 1px solid var(--line);
      border-radius: 999px; padding: 6px 16px;
      font-size: 11px; font-weight: 600; color: var(--ink-soft);
      text-align: center; letter-spacing: 0.08em; text-transform: uppercase;
    }

    /* ========== CONTAINER ========== */
    .page { max-width: 1100px; margin: 0 auto; padding: 0 32px; }

    /* ========== HERO ========== */
    .hero {
      margin-top: 36px;
      display: grid; grid-template-columns: 1.4fr 1fr; gap: 32px;
    }
    .hero-left { padding: 8px 0; }
    .hero-eyebrow {
      font-size: 12px; font-weight: 600; color: var(--ink-mute);
      text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 14px;
    }
    .hero-title {
      font-size: 52px; line-height: 1.05; font-weight: 500;
      margin: 0 0 22px; color: var(--ink);
    }
    .hero-title em { font-style: italic; color: var(--coral); font-weight: 500; }
    .hero-insight {
      font-size: 17px; color: var(--ink-soft); line-height: 1.6;
      max-width: 460px; margin-bottom: 24px;
    }
    .hero-insight strong { color: var(--ink); font-weight: 600; }

    .trend-row { display: flex; align-items: center; gap: 20px; margin-top: 8px; }
    .trend-num {
      font-family: 'Fraunces', serif; font-size: 64px; line-height: 1; font-weight: 500;
      color: var(--sage); letter-spacing: -0.03em;
    }
    .trend-num .sign { font-size: 40px; vertical-align: 6px; }
    .trend-label { font-size: 13px; color: var(--ink-mute); max-width: 160px; line-height: 1.4; }

    /* ========== CARDS ========== */
    .card {
      background: var(--paper); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 24px;
    }
    .card-eyebrow {
      font-size: 11px; font-weight: 700; color: var(--ink-mute);
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px;
    }
    .card-title {
      font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600;
      margin: 0 0 16px; letter-spacing: -0.01em;
    }
    .radar-wrap { display: flex; align-items: center; gap: 16px; }
    .radar-svg { flex-shrink: 0; }
    .radar-legend { font-size: 12px; color: var(--ink-soft); }
    .radar-legend div { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* ========== TIMELINE ========== */
    .timeline-section { margin-top: 64px; }
    .section-header {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 28px;
    }
    .section-title {
      font-family: 'Fraunces', serif; font-size: 28px; font-weight: 500;
      letter-spacing: -0.01em; margin: 0;
    }
    .section-meta { font-size: 13px; color: var(--ink-mute); }

    .timeline { position: relative; padding-left: 36px; }
    .timeline::before {
      content: ''; position: absolute; left: 11px; top: 14px; bottom: 14px;
      width: 2px; background: linear-gradient(to bottom, var(--ochre) 0%, var(--sage) 100%);
      border-radius: 1px;
    }
    .tl-node { position: relative; margin-bottom: 28px; }
    .tl-node::before {
      content: ''; position: absolute; left: -32px; top: 28px;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--paper); border: 2.5px solid var(--ochre);
      box-shadow: 0 0 0 4px var(--cream);
    }
    .tl-node.first::before { border-color: var(--sage); }
    .tl-node.upper::before { border-color: var(--teal); }
    .tl-node.lower::before { border-color: var(--ochre); }
    .tl-node.third::before { border-color: var(--coral); }

    .tl-card {
      background: var(--paper); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 26px 30px;
      transition: transform 0.2s ease, border-color 0.2s ease;
      cursor: pointer; display: grid;
      grid-template-columns: 1fr auto; gap: 24px; align-items: center;
    }
    .tl-card:hover { border-color: var(--ink); transform: translateY(-2px); }
    .tl-module {
      font-size: 11px; font-weight: 600; color: var(--ink-mute);
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px;
    }
    .tl-title {
      font-family: 'Fraunces', serif; font-size: 22px; font-weight: 500;
      line-height: 1.3; margin: 0 0 10px; letter-spacing: -0.005em;
    }
    .tl-meta { font-size: 13px; color: var(--ink-mute); display: flex; gap: 14px; flex-wrap: wrap; }
    .tl-meta span::before { content: '·'; margin-right: 14px; color: var(--line); }
    .tl-meta span:first-child::before { content: ''; margin: 0; }

    .grade-block { text-align: right; }
    .grade-num {
      font-family: 'Fraunces', serif; font-size: 56px; line-height: 1; font-weight: 500;
      letter-spacing: -0.03em;
    }
    .grade-num.first { color: var(--sage); }
    .grade-num.upper { color: var(--teal); }
    .grade-num.lower { color: var(--ochre); }
    .grade-num.third { color: var(--coral); }
    .grade-pct { font-size: 22px; vertical-align: 18px; font-weight: 400; opacity: 0.6; }
    .grade-band {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.1em; margin-top: 4px; color: var(--ink-mute);
    }

    /* ========== DETAIL PAGE ========== */
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 500; color: var(--ink-soft);
      text-decoration: none; margin-top: 32px; cursor: pointer;
      background: none; border: none; padding: 0; font-family: inherit;
    }
    .back-link:hover { color: var(--ink); }

    .detail-header {
      margin-top: 24px; padding-bottom: 32px; border-bottom: 1px solid var(--line);
    }
    .detail-eyebrow {
      font-size: 12px; font-weight: 600; color: var(--ink-mute);
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 14px;
    }
    .detail-title {
      font-family: 'Fraunces', serif; font-size: 38px; font-weight: 500;
      line-height: 1.15; margin: 0 0 20px; letter-spacing: -0.015em;
      max-width: 760px;
    }
    .detail-meta-row {
      display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
    }
    .detail-grade-chip {
      display: inline-flex; align-items: baseline; gap: 8px;
      padding: 8px 18px; border-radius: 999px;
      background: var(--cream-deep); border: 1px solid var(--line);
      font-family: 'Fraunces', serif;
    }
    .detail-grade-chip .num { font-size: 22px; font-weight: 600; }
    .detail-grade-chip .num.first { color: var(--sage); }
    .detail-grade-chip .num.upper { color: var(--teal); }
    .detail-grade-chip .num.lower { color: var(--ochre); }
    .detail-grade-chip .num.third { color: var(--coral); }
    .detail-grade-chip .band {
      font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-soft);
    }
    .detail-meta-text { font-size: 14px; color: var(--ink-mute); }
    .print-btn {
      margin-left: auto;
      background: none; border: 1px solid var(--line); border-radius: 999px;
      padding: 7px 16px; font-size: 12px; font-weight: 500; color: var(--ink-soft);
      font-family: inherit; cursor: pointer;
    }
    .print-btn:hover { border-color: var(--ink); color: var(--ink); }

    /* Section blocks */
    .fb-section {
      margin-top: 36px;
      background: var(--paper); border: 1px solid var(--line);
      border-radius: var(--radius); overflow: hidden;
    }
    .fb-section-bar { height: 4px; background: var(--ink-mute); }
    .fb-section-body { padding: 32px 36px; }
    .fb-section.sec-structure .fb-section-bar { background: var(--sage); }
    .fb-section.sec-understanding .fb-section-bar { background: var(--teal); }
    .fb-section.sec-argument .fb-section-bar { background: var(--plum); }
    .fb-section.sec-writing .fb-section-bar { background: var(--coral); }
    .fb-section.sec-referencing .fb-section-bar { background: var(--ochre); }

    .fb-section .fb-eyebrow {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em;
      margin-bottom: 4px;
    }
    .fb-section.sec-structure .fb-eyebrow { color: var(--sage); }
    .fb-section.sec-understanding .fb-eyebrow { color: var(--teal); }
    .fb-section.sec-argument .fb-eyebrow { color: var(--plum); }
    .fb-section.sec-writing .fb-eyebrow { color: var(--coral); }
    .fb-section.sec-referencing .fb-eyebrow { color: var(--ochre); }

    .fb-section h3 {
      font-family: 'Fraunces', serif; font-size: 26px; font-weight: 500;
      margin: 0 0 22px; letter-spacing: -0.01em;
    }
    .fb-sub { margin-bottom: 22px; }
    .fb-sub:last-of-type { margin-bottom: 0; }
    .fb-sub-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--ink-mute); margin-bottom: 6px;
    }
    .fb-text {
      font-size: 15.5px; line-height: 1.7; color: var(--ink-soft); margin: 0;
    }
    .fb-divider { border: none; border-top: 1px solid var(--line-soft); margin: 22px 0; }

    .tips-box {
      margin-top: 28px; background: var(--cream); border: 1px solid var(--line);
      border-radius: var(--radius-sm); padding: 20px 24px;
    }
    .tips-box-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--ink-soft); margin-bottom: 10px;
    }
    .tips-box ul { margin: 0; padding-left: 18px; }
    .tips-box li {
      font-size: 14px; line-height: 1.65; color: var(--ink); margin-bottom: 8px;
    }
    .tips-box li:last-child { margin-bottom: 0; }

    .practise-link {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 24px; padding: 9px 18px;
      background: var(--ink); color: var(--cream); text-decoration: none;
      border-radius: 999px; font-size: 12px; font-weight: 600;
      letter-spacing: 0.02em;
      transition: background 0.2s;
    }
    .practise-link:hover { background: var(--ink-soft); }

    /* Action plan */
    .action-plan {
      margin-top: 48px;
      background: var(--paper); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 36px;
    }
    .ap-eyebrow {
      font-size: 12px; font-weight: 600; color: var(--ink-mute);
      text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 8px;
    }
    .ap-title {
      font-family: 'Fraunces', serif; font-size: 28px; font-weight: 500;
      margin: 0 0 8px; letter-spacing: -0.01em;
    }
    .ap-intro {
      font-size: 15px; color: var(--ink-soft); margin: 0 0 24px; max-width: 580px;
    }
    .action-item {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 16px 0; border-top: 1px solid var(--line-soft);
    }
    .action-item:last-of-type { border-bottom: 1px solid var(--line-soft); }
    .action-item input[type="checkbox"] {
      margin-top: 3px; width: 18px; height: 18px;
      accent-color: var(--ink); cursor: pointer; flex-shrink: 0;
    }
    .action-item label {
      font-size: 15px; line-height: 1.6; cursor: pointer; flex: 1; color: var(--ink);
    }
    .action-item label.checked { text-decoration: line-through; color: var(--ink-mute); }
    .ap-progress {
      margin-top: 20px; font-size: 13px; color: var(--ink-mute);
    }
    .ap-bar-bg {
      width: 100%; height: 4px; background: var(--line-soft); border-radius: 2px;
      margin-top: 8px; overflow: hidden;
    }
    .ap-bar-fill { height: 100%; background: var(--sage); border-radius: 2px; transition: width 0.3s; }

    /* ========== FOOTER ========== */
    .footer-note {
      max-width: 1100px; margin: 80px auto 48px; padding: 32px 32px 0;
      border-top: 1px solid var(--line);
      font-size: 13px; color: var(--ink-mute); text-align: center; line-height: 1.7;
    }

    /* ========== PRINT ========== */
    @media print {
      .topbar, .demo-banner, .back-link, .print-btn, .practise-link, .footer-note,
      .action-item input[type="checkbox"] { display: none !important; }
      body { background: #fff; }
      .fb-section, .action-plan { break-inside: avoid; border: 1px solid #ddd !important; }
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 820px) {
      .hero { grid-template-columns: 1fr; gap: 24px; }
      .hero-title { font-size: 40px; }
      .tl-card { grid-template-columns: 1fr; }
      .grade-block { text-align: left; }
      .topnav { gap: 18px; }
      .detail-title { font-size: 30px; }
      .fb-section-body { padding: 26px 24px; }
      .action-plan { padding: 26px 24px; }
    }
    @media (max-width: 540px) {
      .topbar, .page, .footer-note, .demo-banner { padding-left: 20px; padding-right: 20px; }
      .hero-title { font-size: 32px; }
      .tl-card { padding: 20px; }
      .tl-title { font-size: 18px; }
      .grade-num { font-size: 44px; }
      .topnav a:not(.avatar) { display: none; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="brand" id="navHome">
      <span class="brand-mark">F</span>
      <span class="brand-name">Feedback</span>
      <span class="brand-sub">Psychology</span>
    </div>
    <nav class="topnav">
      <a href="#" id="navMyWork">My Work</a>
      <a href="skills/index.html">Study Skills</a>
      <a href="#">Help</a>
      <span class="avatar" id="navAvatar"></span>
    </nav>
  </header>

  <div class="demo-banner">
    <div class="demo-banner-inner">Sample data &middot; Demo</div>
  </div>

  <main class="page" id="appContent"></main>

  <div class="footer-note">
    Questions about any comment? Book office hours with your tutor.<br>
    Need this feedback in another format? Email your module convenor.
  </div>

  <script src="app.js"></script>
</body>
</html>
